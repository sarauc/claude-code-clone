<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 800">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="cliGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="middlewareGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="toolsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="promptsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cc5333"/>
      <stop offset="100%" style="stop-color:#d4a574"/>
    </linearGradient>
    <!-- Memory gradient (amber/gold) -->
    <linearGradient id="memoryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f6d365"/>
      <stop offset="100%" style="stop-color:#fda085"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 L4,6 Z" fill="#8b8b9e"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 L4,6 Z" fill="#00d4ff"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 L4,6 Z" fill="#f6d365"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 L4,6 Z" fill="#fda085"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1050" height="800" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="1"/>
    </pattern>
    <rect width="1050" height="800" fill="url(#grid)"/>
  </g>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white">
    <tspan fill="#667eea">yacc</tspan> Architecture
  </text>
  <text x="450" y="70" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" fill="#8b8b9e">
    Yet Another Claude Code
  </text>

  <!-- Feature badges -->
  <rect x="248" y="83" width="190" height="24" rx="12" fill="rgba(0,212,255,0.12)" stroke="#00d4ff" stroke-width="1"/>
  <text x="343" y="99" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" fill="#00d4ff">&#x1F30A; Token Streaming</text>
  <rect x="458" y="83" width="190" height="24" rx="12" fill="rgba(246,211,101,0.12)" stroke="#f6d365" stroke-width="1"/>
  <text x="553" y="99" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" fill="#f6d365">&#x1F9E0; Session Memory</text>

  <!-- ── CLI Layer ──────────────────────────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="100" y="115" width="700" height="90" rx="12" fill="url(#cliGrad)"/>
    <text x="130" y="150" font-family="SF Mono, monospace" font-size="18" font-weight="600" fill="white">CLI Layer</text>
    <text x="130" y="173" font-family="SF Mono, monospace" font-size="12" fill="rgba(255,255,255,0.8)">app.py</text>
    <text x="220" y="173" font-family="SF Mono, monospace" font-size="12" fill="rgba(255,255,255,0.6)">Interactive REPL &#x2022; streams token events in real time</text>
    <text x="130" y="191" font-family="SF Mono, monospace" font-size="12" fill="rgba(255,255,255,0.8)">renderer.py</text>
    <text x="250" y="191" font-family="SF Mono, monospace" font-size="12" fill="rgba(255,255,255,0.6)">Rich output &#x2022; token-by-token display &#x2022; memory panel</text>
    <!-- Terminal icon with streaming effect -->
    <g transform="translate(720, 130)">
      <rect width="62" height="55" rx="6" fill="rgba(0,0,0,0.3)"/>
      <text x="8" y="20" font-family="SF Mono, monospace" font-size="10" fill="#43e97b">&#x276F;</text>
      <rect x="18" y="14" width="30" height="3" rx="1" fill="#43e97b" opacity="0.7"/>
      <!-- streaming token bars -->
      <rect x="8" y="26" width="10" height="2" rx="1" fill="#00d4ff" opacity="0.9"/>
      <rect x="20" y="26" width="14" height="2" rx="1" fill="#00d4ff" opacity="0.65"/>
      <rect x="36" y="26" width="8" height="2" rx="1" fill="#00d4ff" opacity="0.35"/>
      <rect x="8" y="34" width="40" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>
      <rect x="8" y="42" width="25" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>
    </g>
  </g>

  <!-- CLI -> Agent (request down) + streaming tokens up -->
  <path d="M445 205 L445 235" stroke="#8b8b9e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M465 235 L465 205" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)" opacity="0.8"/>
  <text x="482" y="223" font-family="SF Mono, monospace" font-size="9" fill="#00d4ff" opacity="0.9">tokens</text>

  <!-- ── Agent Core ─────────────────────────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="100" y="235" width="700" height="100" rx="12" fill="url(#agentGrad)"/>
    <text x="130" y="273" font-family="SF Mono, monospace" font-size="18" font-weight="600" fill="white">Agent Core</text>
    <text x="130" y="298" font-family="SF Mono, monospace" font-size="12" fill="rgba(255,255,255,0.8)">agent.py</text>
    <text x="220" y="298" font-family="SF Mono, monospace" font-size="12" fill="rgba(255,255,255,0.6)">Orchestrator &#x2022; Streaming generator &#x2022; Tool execution loop</text>
    <text x="130" y="318" font-family="SF Mono, monospace" font-size="12" fill="rgba(255,255,255,0.8)">AgentState</text>
    <text x="240" y="318" font-family="SF Mono, monospace" font-size="12" fill="rgba(255,255,255,0.6)">Conversation history &#x2022; Token tracking &#x2022; Session lifecycle</text>
    <g transform="translate(720, 255)">
      <circle cx="30" cy="30" r="28" fill="rgba(0,0,0,0.2)"/>
      <text x="30" y="38" text-anchor="middle" font-size="28">&#x1F9E0;</text>
    </g>
  </g>

  <!-- Agent -> Middle Layer -->
  <path d="M250 335 L205 375" stroke="#8b8b9e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M450 335 L450 375" stroke="#8b8b9e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M650 335 L695 375" stroke="#8b8b9e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- ── Memory arcs through Agent→Middleware gap ───────────────── -->
  <!-- inject on start: Memory Store → Middleware (gold, top arc) -->
  <path d="M927 375 C 750 344, 480 340, 205 375"
        stroke="#f6d365" stroke-width="1.5" stroke-dasharray="5,4"
        fill="none" marker-end="url(#arrowGold)" opacity="0.85"/>
  <!-- save on exit: Middleware → Memory Store (orange, slightly lower arc) -->
  <path d="M205 370 C 480 353, 750 357, 927 370"
        stroke="#fda085" stroke-width="1.5" stroke-dasharray="5,4"
        fill="none" marker-end="url(#arrowOrange)" opacity="0.85"/>
  <!-- Labels for arcs -->
  <rect x="490" y="335" width="120" height="15" rx="3" fill="#12122a" opacity="0.9"/>
  <text x="550" y="346" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#f6d365">inject on start</text>
  <rect x="490" y="352" width="120" height="15" rx="3" fill="#12122a" opacity="0.9"/>
  <text x="550" y="363" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#fda085">save on exit</text>

  <!-- ── Middleware (expanded — session_memory first) ───────────── -->
  <g filter="url(#shadow)">
    <rect x="100" y="375" width="210" height="215" rx="12" fill="#1e1e30"/>
    <rect x="100" y="375" width="210" height="40" rx="12" fill="url(#middlewareGrad)"/>
    <rect x="100" y="403" width="210" height="12" fill="#1e1e30"/>
    <text x="205" y="402" text-anchor="middle" font-family="SF Mono, monospace" font-size="14" font-weight="600" fill="white">Middleware</text>
    <!-- session_memory: first + highlighted in gold -->
    <g transform="translate(115, 428)">
      <circle cx="6" cy="6" r="5" fill="#f6d365"/>
      <text x="18" y="10" font-family="SF Mono, monospace" font-size="11" fill="#f6d365" font-weight="600">session_memory &#x2736;</text>
    </g>
    <g transform="translate(115, 457)">
      <circle cx="6" cy="6" r="4" fill="#4facfe"/>
      <text x="18" y="10" font-family="SF Mono, monospace" font-size="11" fill="#a0a0b0">prompt_caching</text>
    </g>
    <g transform="translate(115, 484)">
      <circle cx="6" cy="6" r="4" fill="#00f2fe"/>
      <text x="18" y="10" font-family="SF Mono, monospace" font-size="11" fill="#a0a0b0">summarization</text>
    </g>
    <g transform="translate(115, 511)">
      <circle cx="6" cy="6" r="4" fill="#38d9a9"/>
      <text x="18" y="10" font-family="SF Mono, monospace" font-size="11" fill="#a0a0b0">patch_tool_calls</text>
    </g>
    <g transform="translate(115, 538)">
      <circle cx="6" cy="6" r="4" fill="#69db7c"/>
      <text x="18" y="10" font-family="SF Mono, monospace" font-size="11" fill="#a0a0b0">base.py</text>
    </g>
  </g>

  <!-- ── Tools ─────────────────────────────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="345" y="375" width="210" height="160" rx="12" fill="#1e1e30"/>
    <rect x="345" y="375" width="210" height="40" rx="12" fill="url(#toolsGrad)"/>
    <rect x="345" y="403" width="210" height="12" fill="#1e1e30"/>
    <text x="450" y="402" text-anchor="middle" font-family="SF Mono, monospace" font-size="14" font-weight="600" fill="white">Tools</text>
    <g transform="translate(360, 428)">
      <text x="0" y="10" font-family="SF Mono, monospace" font-size="11" fill="#a0a0b0">&#x1F4C1; ls, glob, grep</text>
    </g>
    <g transform="translate(360, 453)">
      <text x="0" y="10" font-family="SF Mono, monospace" font-size="11" fill="#a0a0b0">&#x1F4C4; read_file, write_file</text>
    </g>
    <g transform="translate(360, 478)">
      <text x="0" y="10" font-family="SF Mono, monospace" font-size="11" fill="#a0a0b0">&#x270F;&#xFE0F;  edit_file</text>
    </g>
    <g transform="translate(360, 503)">
      <text x="0" y="10" font-family="SF Mono, monospace" font-size="11" fill="#a0a0b0">&#x1F4BB; bash, write_todos</text>
    </g>
  </g>

  <!-- ── Prompts ────────────────────────────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="590" y="375" width="210" height="160" rx="12" fill="#1e1e30"/>
    <rect x="590" y="375" width="210" height="40" rx="12" fill="url(#promptsGrad)"/>
    <rect x="590" y="403" width="210" height="12" fill="#1e1e30"/>
    <text x="695" y="402" text-anchor="middle" font-family="SF Mono, monospace" font-size="14" font-weight="600" fill="white">Prompts</text>
    <g transform="translate(605, 428)">
      <text x="0" y="10" font-family="SF Mono, monospace" font-size="11" fill="#a0a0b0">system.py</text>
    </g>
    <g transform="translate(605, 451)">
      <text x="0" y="10" font-family="SF Mono, monospace" font-size="10" fill="#707080">&#x2022; Planning instructions</text>
    </g>
    <g transform="translate(605, 469)">
      <text x="0" y="10" font-family="SF Mono, monospace" font-size="10" fill="#707080">&#x2022; Filesystem guidelines</text>
    </g>
    <g transform="translate(605, 487)">
      <text x="0" y="10" font-family="SF Mono, monospace" font-size="10" fill="#707080">&#x2022; Tool usage rules</text>
    </g>
    <g transform="translate(605, 505)">
      <text x="0" y="10" font-family="SF Mono, monospace" font-size="11" fill="#a0a0b0">schemas/types.py</text>
    </g>
  </g>

  <!-- ── Session Memory Store (new) ────────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="830" y="375" width="195" height="215" rx="12" fill="#1e1e30"/>
    <rect x="830" y="375" width="195" height="40" rx="12" fill="url(#memoryGrad)"/>
    <rect x="830" y="403" width="195" height="12" fill="#1e1e30"/>
    <text x="927" y="402" text-anchor="middle" font-family="SF Mono, monospace" font-size="13" font-weight="600" fill="white">Memory Store</text>
    <text x="845" y="432" font-family="SF Mono, monospace" font-size="11" fill="#f6d365">&#x1F4C1; .claude/memory.md</text>
    <text x="845" y="456" font-family="SF Mono, monospace" font-size="10" fill="#707080">&#x2022; Newest sessions first</text>
    <text x="845" y="474" font-family="SF Mono, monospace" font-size="10" fill="#707080">&#x2022; Per-repo isolation</text>
    <text x="845" y="492" font-family="SF Mono, monospace" font-size="10" fill="#707080">&#x2022; Human-readable MD</text>
    <text x="845" y="510" font-family="SF Mono, monospace" font-size="10" fill="#707080">&#x2022; Injected into system</text>
    <text x="845" y="528" font-family="SF Mono, monospace" font-size="10" fill="#707080">&#x2022; prompt on startup</text>
    <!-- File visual -->
    <g transform="translate(944, 450)">
      <rect width="58" height="68" rx="4" fill="rgba(246,211,101,0.08)" stroke="#f6d365" stroke-width="1" opacity="0.5"/>
      <rect x="8" y="10" width="42" height="2" rx="1" fill="#f6d365" opacity="0.5"/>
      <rect x="8" y="18" width="28" height="2" rx="1" fill="#fda085" opacity="0.4"/>
      <rect x="8" y="26" width="36" height="2" rx="1" fill="#fda085" opacity="0.3"/>
      <rect x="8" y="34" width="22" height="2" rx="1" fill="#fda085" opacity="0.3"/>
      <rect x="8" y="42" width="38" height="2" rx="1" fill="#fda085" opacity="0.2"/>
      <rect x="8" y="50" width="18" height="2" rx="1" fill="#fda085" opacity="0.2"/>
    </g>
  </g>

  <!-- Arrows Middle Layer -> API -->
  <path d="M205 590 L350 640" stroke="#8b8b9e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M450 535 L450 640" stroke="#8b8b9e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M695 535 L550 640" stroke="#8b8b9e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- ── Anthropic Claude API ────────────────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="250" y="640" width="400" height="80" rx="12" fill="url(#apiGrad)"/>
    <text x="320" y="676" font-family="SF Mono, monospace" font-size="16" font-weight="600" fill="white">Anthropic Claude API</text>
    <text x="320" y="699" font-family="SF Mono, monospace" font-size="12" fill="rgba(255,255,255,0.7)">claude-sonnet-4.5 &#x2022; streaming SSE responses</text>
    <g transform="translate(562, 660)">
      <rect width="70" height="40" rx="8" fill="rgba(0,0,0,0.2)"/>
      <text x="35" y="27" text-anchor="middle" font-family="SF Pro Display, sans-serif" font-size="12" font-weight="600" fill="white">Claude</text>
    </g>
  </g>

  <!-- Streaming: API back up to CLI (right-side dashed blue path) -->
  <path d="M800 650 C 820 620, 820 530, 820 470 C 820 400, 820 300, 810 205"
        stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="6,4"
        fill="none" marker-end="url(#arrowBlue)" opacity="0.55"/>
  <rect x="823" y="400" width="14" height="150" rx="2" fill="none"/>
  <text transform="rotate(-90,835,470)" x="835" y="470"
        font-family="SF Mono, monospace" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.85">
    &#x1F30A; token stream
  </text>

  <!-- Entry point badge -->
  <g filter="url(#glow)">
    <rect x="360" y="752" width="180" height="32" rx="16" fill="#667eea"/>
    <text x="450" y="774" text-anchor="middle" font-family="SF Mono, monospace" font-size="13" font-weight="600" fill="white">&#x25B6; yacc / run.py</text>
  </g>

  <!-- Version badge -->
  <g transform="translate(975, 15)">
    <rect width="60" height="22" rx="11" fill="rgba(102,126,234,0.3)"/>
    <text x="30" y="15" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#667eea">v0.1.0</text>
  </g>
</svg>
